<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>weirdshape</title>
  <link rel="stylesheet" href="style.css">
  <!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "2bea1f80253e430186ca8b291f714938"}'></script><!-- End Cloudflare Web Analytics -->
  <link rel="icon" type="image/jpg" href="evolve.png">
  <meta property="og:title" content="weirdshape — electronic indie music">
  <meta property="og:description" content="weirdshape is an electronic indie artist.">
  <meta property="og:url" content="https://weirdshape.com">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://weirdshape.com/meta.jpg">
</head>
<body>
  <div id="bg">
    <div id="bg-home" aria-hidden="true"></div>
    <canvas id="bg-canvas" aria-hidden="true"></canvas>
  </div>
  <iframe id="sc-iframe" src="" allow="autoplay" style="display:none"></iframe>
  <iframe id="sc-meta-iframe" src="" style="display:none"></iframe>
  <div id="app"></div>
  <div id="mini-bar">
    <div class="mini-progress"><div class="mini-progress-fill"></div></div>
    <div class="mini-content">
      <div class="mini-left">
        <div class="mini-artwork-wrap">
          <img class="mini-artwork" alt="">
        </div>
        <span class="mini-title"></span>
      </div>
      <div class="mini-right">
        <span class="mini-time">0:00 / 0:00</span>
        <button class="mini-restart" disabled><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 12" width="12" height="12" fill="currentColor"><rect x="0" y="0" width="2" height="12"/><polygon points="2,6 12,0 12,12"/></svg></button>
        <button class="mini-play"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 12" width="10" height="12" fill="currentColor"><polygon points="0,0 10,6 0,12"/></svg></button>
        <button class="mini-skip"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 12" width="12" height="12" fill="currentColor"><polygon points="0,0 10,6 0,12"/><rect x="10" y="0" width="2" height="12"/></svg></button>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
